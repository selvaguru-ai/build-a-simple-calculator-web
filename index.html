<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div
      class="calculator"
      role="application"
      aria-label="Calculator"
    >
      <!-- Visually hidden heading for screen readers -->
      <h1 class="sr-only">Calculator Application</h1>

      <!-- Display -->
      <div class="display" aria-label="Calculator display">
        <div
          class="display__expression"
          id="display-expression"
          aria-hidden="true"
        ></div>
        <div
          class="display__current"
          id="display-current"
          role="status"
          aria-live="polite"
          aria-atomic="true"
          aria-label="Current value"
        >0</div>
      </div>

      <!-- Button Grid -->
      <div class="button-grid" role="group" aria-label="Calculator buttons">
        <!-- Row 1 -->
        <button
          class="btn btn--action btn--wide"
          data-action="clear"
          tabindex="0"
          aria-label="Clear"
        >C</button>
        <button
          class="btn btn--action"
          data-action="toggle-sign"
          tabindex="0"
          aria-label="Toggle sign"
        >+/−</button>
        <button
          class="btn btn--action"
          data-action="percent"
          tabindex="0"
          aria-label="Percent"
        >%</button>
        <button
          class="btn btn--operator"
          data-operator="/"
          tabindex="0"
          aria-label="Divide"
        >÷</button>

        <!-- Row 2 -->
        <button
          class="btn btn--digit"
          data-digit="7"
          tabindex="0"
          aria-label="7"
        >7</button>
        <button
          class="btn btn--digit"
          data-digit="8"
          tabindex="0"
          aria-label="8"
        >8</button>
        <button
          class="btn btn--digit"
          data-digit="9"
          tabindex="0"
          aria-label="9"
        >9</button>
        <button
          class="btn btn--operator"
          data-operator="*"
          tabindex="0"
          aria-label="Multiply"
        >×</button>

        <!-- Row 3 -->
        <button
          class="btn btn--digit"
          data-digit="4"
          tabindex="0"
          aria-label="4"
        >4</button>
        <button
          class="btn btn--digit"
          data-digit="5"
          tabindex="0"
          aria-label="5"
        >5</button>
        <button
          class="btn btn--digit"
          data-digit="6"
          tabindex="0"
          aria-label="6"
        >6</button>
        <button
          class="btn btn--operator"
          data-operator="-"
          tabindex="0"
          aria-label="Subtract"
        >−</button>

        <!-- Row 4 -->
        <button
          class="btn btn--digit"
          data-digit="1"
          tabindex="0"
          aria-label="1"
        >1</button>
        <button
          class="btn btn--digit"
          data-digit="2"
          tabindex="0"
          aria-label="2"
        >2</button>
        <button
          class="btn btn--digit"
          data-digit="3"
          tabindex="0"
          aria-label="3"
        >3</button>
        <button
          class="btn btn--operator"
          data-operator="+"
          tabindex="0"
          aria-label="Add"
        >+</button>

        <!-- Row 5 -->
        <button
          class="btn btn--digit btn--zero"
          data-digit="0"
          tabindex="0"
          aria-label="0"
        >0</button>
        <button
          class="btn btn--action"
          data-action="decimal"
          tabindex="0"
          aria-label="Decimal point"
        >.</button>
        <button
          class="btn btn--equals"
          data-action="equals"
          tabindex="0"
          aria-label="Equals"
        >=</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
