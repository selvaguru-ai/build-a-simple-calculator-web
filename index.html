<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple, accessible calculator web app built with Vanilla HTML5, CSS3, and JavaScript." />
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <!-- Calculator container -->
      <div class="calculator-container">

        <!-- Display section: shows previous operand / operator and current operand -->
        <div class="display">
          <span class="previous-operand" aria-label="Previous operand" aria-live="polite"></span>
          <span class="current-operand" aria-label="Current operand" aria-live="assertive">0</span>
        </div>

        <!-- Button grid: 19 buttons total -->
        <div class="button-grid">

          <!-- Row 1: Clear, Plus/Minus toggle, Backspace, Divide -->
          <button
            type="button"
            class="btn btn-action btn-wide"
            data-action="clear"
            aria-label="Clear all"
          >C</button>

          <button
            type="button"
            class="btn btn-action"
            data-action="toggle-sign"
            aria-label="Toggle positive/negative sign"
          >&plusmn;</button>

          <button
            type="button"
            class="btn btn-action"
            data-action="backspace"
            aria-label="Delete last character"
          >&#9003;</button>

          <button
            type="button"
            class="btn btn-operator"
            data-operator="/"
            aria-label="Divide"
          >&divide;</button>

          <!-- Row 2: 7, 8, 9, Multiply -->
          <button
            type="button"
            class="btn btn-number"
            data-number="7"
            aria-label="7"
          >7</button>

          <button
            type="button"
            class="btn btn-number"
            data-number="8"
            aria-label="8"
          >8</button>

          <button
            type="button"
            class="btn btn-number"
            data-number="9"
            aria-label="9"
          >9</button>

          <button
            type="button"
            class="btn btn-operator"
            data-operator="*"
            aria-label="Multiply"
          >&times;</button>

          <!-- Row 3: 4, 5, 6, Subtract -->
          <button
            type="button"
            class="btn btn-number"
            data-number="4"
            aria-label="4"
          >4</button>

          <button
            type="button"
            class="btn btn-number"
            data-number="5"
            aria-label="5"
          >5</button>

          <button
            type="button"
            class="btn btn-number"
            data-number="6"
            aria-label="6"
          >6</button>

          <button
            type="button"
            class="btn btn-operator"
            data-operator="-"
            aria-label="Subtract"
          >&minus;</button>

          <!-- Row 4: 1, 2, 3, Add -->
          <button
            type="button"
            class="btn btn-number"
            data-number="1"
            aria-label="1"
          >1</button>

          <button
            type="button"
            class="btn btn-number"
            data-number="2"
            aria-label="2"
          >2</button>

          <button
            type="button"
            class="btn btn-number"
            data-number="3"
            aria-label="3"
          >3</button>

          <button
            type="button"
            class="btn btn-operator"
            data-operator="+"
            aria-label="Add"
          >+</button>

          <!-- Row 5: 0 (wide), Decimal, Equals -->
          <button
            type="button"
            class="btn btn-number btn-wide"
            data-number="0"
            aria-label="0"
          >0</button>

          <button
            type="button"
            class="btn btn-number"
            data-action="decimal"
            aria-label="Decimal point"
          >.</button>

          <button
            type="button"
            class="btn btn-equals"
            data-action="equals"
            aria-label="Equals"
          >=</button>

        </div>
        <!-- /.button-grid -->
      </div>
      <!-- /.calculator-container -->
    </main>

    <script src="script.js"></script>
  </body>
</html>
