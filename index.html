<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple, clean calculator web app built with vanilla HTML, CSS, and JavaScript." />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <!-- script deferred so DOM is fully parsed before JS runs -->
    <script src="script.js" defer></script>
  </head>
  <body>
    <!-- Root application container -->
    <div id="app">
      <main class="calculator" role="main" aria-label="Calculator">

        <!-- Display section: shows expression history and current input/result -->
        <section class="display" aria-label="Calculator display" aria-live="polite">
          <!-- Shows the previous operand and selected operator -->
          <span class="display__expression" aria-label="Expression" id="display-expression">&nbsp;</span>
          <!-- Shows the current input or computed result -->
          <span class="display__current" aria-label="Current value" id="display-current">0</span>
        </section>

        <!-- Button grid: 4-column layout containing all 19 calculator buttons -->
        <section class="button-grid" aria-label="Calculator buttons">

          <!-- Row 1: Clear, Backspace, Percent, Divide -->
          <button
            class="btn btn--action"
            data-action="clear"
            aria-label="Clear all"
            type="button"
          >C</button>

          <button
            class="btn btn--action"
            data-action="backspace"
            aria-label="Backspace, delete last character"
            type="button"
          >&#9003;</button>

          <button
            class="btn btn--action"
            data-action="percent"
            aria-label="Percent"
            type="button"
          >%</button>

          <button
            class="btn btn--operator"
            data-operator="/"
            aria-label="Divide"
            type="button"
          >&#247;</button>

          <!-- Row 2: 7, 8, 9, Multiply -->
          <button
            class="btn btn--digit"
            data-digit="7"
            aria-label="7"
            type="button"
          >7</button>

          <button
            class="btn btn--digit"
            data-digit="8"
            aria-label="8"
            type="button"
          >8</button>

          <button
            class="btn btn--digit"
            data-digit="9"
            aria-label="9"
            type="button"
          >9</button>

          <button
            class="btn btn--operator"
            data-operator="*"
            aria-label="Multiply"
            type="button"
          >&#215;</button>

          <!-- Row 3: 4, 5, 6, Subtract -->
          <button
            class="btn btn--digit"
            data-digit="4"
            aria-label="4"
            type="button"
          >4</button>

          <button
            class="btn btn--digit"
            data-digit="5"
            aria-label="5"
            type="button"
          >5</button>

          <button
            class="btn btn--digit"
            data-digit="6"
            aria-label="6"
            type="button"
          >6</button>

          <button
            class="btn btn--operator"
            data-operator="-"
            aria-label="Subtract"
            type="button"
          >&#8722;</button>

          <!-- Row 4: 1, 2, 3, Add -->
          <button
            class="btn btn--digit"
            data-digit="1"
            aria-label="1"
            type="button"
          >1</button>

          <button
            class="btn btn--digit"
            data-digit="2"
            aria-label="2"
            type="button"
          >2</button>

          <button
            class="btn btn--digit"
            data-digit="3"
            aria-label="3"
            type="button"
          >3</button>

          <button
            class="btn btn--operator"
            data-operator="+"
            aria-label="Add"
            type="button"
          >+</button>

          <!-- Row 5: Toggle Sign, 0, Decimal, Equals -->
          <button
            class="btn btn--action"
            data-action="toggle-sign"
            aria-label="Toggle positive or negative sign"
            type="button"
          >+/&#8722;</button>

          <button
            class="btn btn--digit"
            data-digit="0"
            aria-label="0"
            type="button"
          >0</button>

          <button
            class="btn btn--action"
            data-action="decimal"
            aria-label="Decimal point"
            type="button"
          >.</button>

          <button
            class="btn btn--equals"
            data-action="equals"
            aria-label="Equals, calculate result"
            type="button"
          >=</button>

        </section>
        <!-- /.button-grid -->

      </main>
      <!-- /.calculator -->
    </div>
    <!-- /#app -->
  </body>
</html>
