<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A clean, responsive calculator built with vanilla HTML, CSS, and JavaScript." />
  <title>Calculator</title>

  <!-- Preconnect to Google Fonts for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">
    <div class="calculator" role="application" aria-label="Calculator">

      <!-- Display -->
      <div class="display" id="display" aria-live="polite" aria-atomic="true">
        <div class="display__expression" id="display-expression" aria-label="Expression"></div>
        <div class="display__current"    id="display-current"    aria-label="Current value">0</div>
      </div>

      <!-- Button Grid -->
      <div class="button-grid">

        <!-- Row 1: Actions + Divide -->
        <button data-action="clear"       aria-label="Clear">C</button>
        <button data-action="toggle-sign" aria-label="Toggle sign">+/−</button>
        <button data-action="percent"     aria-label="Percent">%</button>
        <button data-operator="/"         aria-label="Divide">÷</button>

        <!-- Row 2: 7 8 9 × -->
        <button data-digit="7" aria-label="7">7</button>
        <button data-digit="8" aria-label="8">8</button>
        <button data-digit="9" aria-label="9">9</button>
        <button data-operator="*" aria-label="Multiply">×</button>

        <!-- Row 3: 4 5 6 − -->
        <button data-digit="4" aria-label="4">4</button>
        <button data-digit="5" aria-label="5">5</button>
        <button data-digit="6" aria-label="6">6</button>
        <button data-operator="-" aria-label="Subtract">−</button>

        <!-- Row 4: 1 2 3 + -->
        <button data-digit="1" aria-label="1">1</button>
        <button data-digit="2" aria-label="2">2</button>
        <button data-digit="3" aria-label="3">3</button>
        <button data-operator="+" aria-label="Add">+</button>

        <!-- Row 5: +/− 0 . = -->
        <button data-action="backspace" aria-label="Backspace">⌫</button>
        <button data-digit="0"          aria-label="0">0</button>
        <button data-action="decimal"   aria-label="Decimal point">.</button>
        <button data-action="equals"    aria-label="Equals">=</button>

      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
