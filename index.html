<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A clean, accessible calculator built with vanilla HTML, CSS and JavaScript." />
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="calculator-wrapper" role="main" aria-label="Calculator">

    <!-- Display -->
    <section class="display" aria-live="polite" aria-label="Calculator display">
      <span class="previous-operand" aria-label="Previous operand"></span>
      <span class="current-operand"  aria-label="Current operand">0</span>
    </section>

    <!-- Button grid -->
    <div class="button-grid" role="group" aria-label="Calculator buttons">

      <!-- Row 1: Clear, Toggle sign, Backspace, Divide -->
      <button class="btn btn--function btn--wide"
              data-action="clear"
              aria-label="Clear all">AC</button>

      <button class="btn btn--function"
              data-action="toggle-sign"
              aria-label="Toggle positive / negative">+/−</button>

      <button class="btn btn--function"
              data-action="delete"
              aria-label="Delete last digit">⌫</button>

      <button class="btn btn--operator"
              data-action="operator"
              data-value="/"
              aria-label="Divide">÷</button>

      <!-- Row 2: 7 8 9 × -->
      <button class="btn btn--number"
              data-action="number"
              data-value="7"
              aria-label="7">7</button>

      <button class="btn btn--number"
              data-action="number"
              data-value="8"
              aria-label="8">8</button>

      <button class="btn btn--number"
              data-action="number"
              data-value="9"
              aria-label="9">9</button>

      <button class="btn btn--operator"
              data-action="operator"
              data-value="*"
              aria-label="Multiply">×</button>

      <!-- Row 3: 4 5 6 − -->
      <button class="btn btn--number"
              data-action="number"
              data-value="4"
              aria-label="4">4</button>

      <button class="btn btn--number"
              data-action="number"
              data-value="5"
              aria-label="5">5</button>

      <button class="btn btn--number"
              data-action="number"
              data-value="6"
              aria-label="6">6</button>

      <button class="btn btn--operator"
              data-action="operator"
              data-value="-"
              aria-label="Subtract">−</button>

      <!-- Row 4: 1 2 3 + -->
      <button class="btn btn--number"
              data-action="number"
              data-value="1"
              aria-label="1">1</button>

      <button class="btn btn--number"
              data-action="number"
              data-value="2"
              aria-label="2">2</button>

      <button class="btn btn--number"
              data-action="number"
              data-value="3"
              aria-label="3">3</button>

      <button class="btn btn--operator"
              data-action="operator"
              data-value="+"
              aria-label="Add">+</button>

      <!-- Row 5: 0 (wide) . = -->
      <button class="btn btn--number btn--zero"
              data-action="number"
              data-value="0"
              aria-label="0">0</button>

      <button class="btn btn--number"
              data-action="decimal"
              aria-label="Decimal point">.</button>

      <button class="btn btn--equals"
              data-action="equals"
              aria-label="Equals">=</button>

    </div><!-- /.button-grid -->
  </main>

  <script src="script.js"></script>
</body>
</html>
